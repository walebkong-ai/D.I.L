<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Good Morning · Weight</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000000;
      --card-bg: #0a0a0f;
      --card-border: rgba(110, 231, 183, 0.10);
      --mint: #6ee7b7;
      --mint-dim: rgba(110, 231, 183, 0.45);
      --amber: #fbbf24;
      --red: #f87171;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.55);
      --faint: rgba(255, 255, 255, 0.10);
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html,
    body {
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 40px) 20px calc(env(safe-area-inset-bottom) + 40px);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .home-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeUp 600ms ease-out backwards;
    }

    .home-divider::before,
    .home-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--faint);
    }

    .home-divider span {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
    }

    .weight-card,
    .progress-link {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      animation: fadeUp 600ms ease-out backwards;
    }

    .weight-card {
      border-radius: 20px;
      padding: 24px 22px 22px;
      animation-delay: 80ms;
    }

    .weight-label,
    .progress-link-label,
    .weight-locked-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted);
      font-weight: 500;
    }

    .weight-label {
      margin-bottom: 8px;
    }

    .weight-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }

    .weight-num {
      font-size: clamp(48px, 14vw, 56px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .weight-unit {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .weight-delta {
      color: var(--amber);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .weight-streak {
      color: var(--mint);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 22px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .weight-chart-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .weight-chart-yaxis {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 0;
    }

    .weight-chart-yaxis span {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }

    .weight-chart {
      height: 130px;
      display: block;
      margin-left: 36px;
      width: calc(100% - 36px);
    }

    .weight-grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
    .weight-area { fill: url(#weightFill); }

    .weight-line {
      fill: none;
      stroke: var(--mint);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .weight-avg-line {
      fill: none;
      stroke: var(--mint-dim);
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
      opacity: 0.6;
    }

    .weight-dot {
      fill: var(--mint);
      stroke: var(--card-bg);
      stroke-width: 1.5;
    }

    .weight-dot-today {
      fill: #ffffff;
      stroke: var(--mint);
      stroke-width: 2;
      filter: url(#weightTodayGlow);
    }

    .chart-meta {
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 8px;
    }

    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-weight: 500;
    }

    .legend-dot {
      width: 14px;
      height: 2px;
      background: var(--mint);
      border-radius: 1px;
    }

    .legend-dot-avg {
      background: transparent;
      border-top: 2px dashed var(--mint-dim);
      height: 2px;
    }

    .weight-locked {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(110, 231, 183, 0.04);
      border: 1px solid rgba(110, 231, 183, 0.16);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 18px;
    }

    .weight-locked-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .weight-locked-check {
      width: 32px;
      height: 32px;
      background: rgba(110, 231, 183, 0.12);
      color: var(--mint);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex: 0 0 auto;
    }

    .weight-locked-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      margin-bottom: 2px;
    }

    .weight-locked-value {
      font-size: 18px;
      font-weight: 600;
    }

    .weight-edit-btn {
      background: transparent;
      border: 0;
      color: var(--mint);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 12px;
    }

    .weight-input-row {
      margin-top: 18px;
    }

    .weight-input-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .weight-input,
    .weight-note-input {
      width: 100%;
      border-radius: 12px;
      color: var(--text);
      outline: none;
    }

    .weight-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--faint);
      font-size: 18px;
      font-weight: 500;
      padding: 12px 14px;
    }

    .weight-input:focus {
      border-color: rgba(110, 231, 183, 0.4);
    }

    .weight-unit-static {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
    }

    .weight-save-btn {
      background: var(--mint);
      color: #000;
      border: 0;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .weight-note-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
      padding: 12px 14px;
    }

    .weight-note-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .hidden { display: none !important; }

    .progress-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 18px;
      padding: 20px 22px;
      margin-top: 18px;
      transition: border-color 200ms, transform 150ms;
      width: 100%;
      text-align: left;
      animation-delay: 160ms;
    }

    .progress-link:hover {
      border-color: rgba(110, 231, 183, 0.25);
    }

    .progress-link:active {
      transform: scale(0.99);
    }

    .progress-link-label {
      margin-bottom: 4px;
    }

    .progress-link-count {
      font-size: 16px;
      font-weight: 500;
    }

    .progress-link-arrow {
      color: var(--mint);
      font-size: 22px;
    }

    .progress-overlay,
    .photo-viewer,
    .compare-view {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease, transform 320ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    .progress-overlay {
      z-index: 100;
      overflow-y: auto;
      transform: translateY(100%);
    }

    .progress-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .progress-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 24px) 20px 40px;
    }

    .progress-header,
    .compare-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .progress-back {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .progress-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .progress-action {
      min-height: 56px;
      border-radius: 14px;
      border: 0;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 150ms;
    }

    .progress-action:active {
      transform: scale(0.98);
    }

    .progress-action-primary {
      background: var(--mint);
      color: #000;
    }

    .progress-action-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--faint);
      color: var(--text);
    }

    .progress-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .progress-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .progress-photo-card,
    .photo-viewer-frame,
    .compare-slot,
    .compare-picker-thumb {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a24 0%, #0a0f0a 50%, #051208 100%);
      border: 1px solid rgba(110, 231, 183, 0.10);
    }

    .progress-photo-card {
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      transition: transform 150ms, opacity 250ms;
      padding: 0;
    }

    .progress-photo-card:active {
      transform: scale(0.98);
    }

    .progress-photo-card.is-removing {
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }

    .progress-photo-img,
    .photo-viewer-img,
    .compare-slot img,
    .compare-picker-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .progress-photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.18;
    }

    .progress-photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
    }

    .progress-photo-meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 14px;
      font-weight: 500;
    }

    .photo-date,
    .photo-viewer-date,
    .compare-slot-date {
      color: var(--mint);
    }

    .photo-viewer,
    .compare-view {
      background: rgba(0, 0, 0, 0.96);
      z-index: 200;
      display: flex;
      flex-direction: column;
    }

    .compare-view { z-index: 300; background: rgba(0, 0, 0, 0.98); }
    .photo-viewer.is-open,
    .compare-view.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-viewer-eyebrow {
      text-align: center;
      padding: calc(env(safe-area-inset-top) + 24px) 20px 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    .photo-viewer-stage,
    .compare-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }

    .photo-viewer-frame {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
    }

    .photo-viewer-meta {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 24px 12px;
      width: 100%;
    }

    .photo-viewer-date {
      font-size: 11px;
      letter-spacing: 0.22em;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .photo-viewer-weight {
      font-size: 24px;
      font-weight: 600;
    }

    .photo-viewer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 8px 12px calc(env(safe-area-inset-bottom) + 24px);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .photo-viewer-btn {
      background: transparent;
      border: 0;
      font-size: 15px;
      font-weight: 500;
      padding: 16px 12px;
      border-radius: 12px;
      transition: background 150ms;
    }

    .pv-compare { color: var(--mint); }
    .pv-close { color: var(--text); }
    .pv-delete { color: var(--red); }
    .pv-delete.is-confirm { background: rgba(248, 113, 113, 0.10); }

    .compare-header {
      justify-content: space-between;
      padding: calc(env(safe-area-inset-top) + 24px) 20px 16px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .compare-title {
      font-size: 13px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    .compare-close {
      background: transparent;
      border: 0;
      color: var(--mint);
      font-size: 15px;
      font-weight: 500;
    }

    .compare-stage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 8px 16px 16px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .compare-slot {
      aspect-ratio: 3 / 4;
      border-radius: 14px;
    }

    .compare-slot-meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7));
    }

    .compare-slot-date {
      font-size: 10px;
      letter-spacing: 0.2em;
      margin-bottom: 2px;
    }

    .compare-slot-weight {
      font-size: 16px;
    }

    .compare-picker {
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .compare-picker-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 14px;
    }

    .compare-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }

    .compare-picker-thumb {
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      padding: 0;
    }

    .compare-picker-thumb-date {
      position: absolute;
      bottom: 4px;
      left: 6px;
      right: 6px;
      font-size: 10px;
      color: var(--mint);
      font-weight: 500;
      background: rgba(0,0,0,0.5);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 40px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text);
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease, transform 200ms ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .progress-grid { grid-template-columns: 1fr; }
      .weight-input-top { grid-template-columns: 1fr auto; }
      .weight-save-btn { grid-column: 1 / -1; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="home-divider"><span>WEIGHT</span></div>

  <section class="weight-card">
    <div class="weight-label">WEIGHT</div>
    <div class="weight-row">
      <span class="weight-num">162.2</span>
      <span class="weight-unit">lbs</span>
    </div>
    <div class="weight-delta">↑ +0.4 lbs · last 7d</div>
    <div class="weight-streak">🔥<span>2 day streak</span></div>

    <div class="weight-chart-wrap">
      <div class="weight-chart-yaxis">
        <span>163.4</span>
        <span>159.0</span>
      </div>
      <svg class="weight-chart" viewBox="0 0 320 130" preserveAspectRatio="none" aria-label="Weight chart">
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"></stop>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"></stop>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="coloredBlur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="coloredBlur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
        </defs>
        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>
        <path class="weight-avg-line" d="M 8 78 Q 32 76, 56 74 T 104 70 T 152 68 T 200 64 T 248 58 T 296 52 T 312 48"></path>
        <path class="weight-area" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45 L 312 130 L 8 130 Z"></path>
        <path class="weight-line" filter="url(#weightLineGlow)" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45"></path>
        <circle class="weight-dot" cx="8" cy="60" r="3"></circle>
        <circle class="weight-dot" cx="24" cy="28" r="3"></circle>
        <circle class="weight-dot" cx="40" cy="95" r="3"></circle>
        <circle class="weight-dot" cx="56" cy="100" r="3"></circle>
        <circle class="weight-dot" cx="72" cy="70" r="3"></circle>
        <circle class="weight-dot" cx="88" cy="78" r="3"></circle>
        <circle class="weight-dot" cx="104" cy="60" r="3"></circle>
        <circle class="weight-dot" cx="120" cy="65" r="3"></circle>
        <circle class="weight-dot" cx="136" cy="50" r="3"></circle>
        <circle class="weight-dot" cx="152" cy="70" r="3"></circle>
        <circle class="weight-dot" cx="168" cy="60" r="3"></circle>
        <circle class="weight-dot" cx="184" cy="55" r="3"></circle>
        <circle class="weight-dot" cx="200" cy="60" r="3"></circle>
        <circle class="weight-dot" cx="216" cy="50" r="3"></circle>
        <circle class="weight-dot" cx="232" cy="55" r="3"></circle>
        <circle class="weight-dot" cx="248" cy="48" r="3"></circle>
        <circle class="weight-dot" cx="264" cy="52" r="3"></circle>
        <circle class="weight-dot" cx="280" cy="48" r="3"></circle>
        <circle class="weight-dot" cx="296" cy="50" r="3"></circle>
        <circle class="weight-dot-today" cx="312" cy="45" r="5"></circle>
      </svg>
      <div class="chart-meta">18 entries · last 30 days</div>
    </div>

    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot"></span>DAILY</span>
      <span class="legend-item"><span class="legend-dot legend-dot-avg"></span>7-DAY AVG</span>
    </div>

    <div class="weight-locked" id="weightLocked">
      <div class="weight-locked-info">
        <span class="weight-locked-check">✓</span>
        <div>
          <div class="weight-locked-label">LOGGED TODAY</div>
          <div class="weight-locked-value">162.2 lbs</div>
        </div>
      </div>
      <button class="weight-edit-btn" id="weightEditBtn" type="button">Edit</button>
    </div>

    <div class="weight-input-row hidden" id="weightInputRow">
      <div class="weight-input-top">
        <input type="number" step="0.1" class="weight-input" id="weightInput" value="162.2" inputmode="decimal" aria-label="Today's weight in pounds">
        <span class="weight-unit-static">lbs</span>
        <button class="weight-save-btn" id="weightSaveBtn" type="button">Save</button>
      </div>
      <input type="text" class="weight-note-input" placeholder="Note (optional) — e.g. carb refeed, post-flu" maxlength="80">
    </div>
  </section>

  <button class="progress-link" id="progressLink" type="button" aria-label="Open progress photos">
    <div>
      <div class="progress-link-label">PROGRESS PHOTOS</div>
      <div class="progress-link-count" id="progressLinkCount">1 photo · latest May 8</div>
    </div>
    <span class="progress-link-arrow">→</span>
  </button>

  <div class="progress-overlay" id="progressOverlay" aria-hidden="true">
    <div class="progress-inner">
      <div class="progress-header">
        <button class="progress-back" id="progressBack" type="button" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="progress-title">Progress</div>
      </div>

      <div class="progress-actions">
        <button class="progress-action progress-action-primary" id="takePhotoBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          Take Photo
        </button>
        <button class="progress-action progress-action-secondary" id="fromLibraryBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          From Library
        </button>
      </div>

      <input type="file" accept="image/*" capture="environment" id="cameraInput" hidden>
      <input type="file" accept="image/*" id="libraryInput" hidden>

      <div class="progress-grid" id="progressGrid">
        <button class="progress-photo-card" data-photo-id="seed" type="button" aria-label="Open photo">
          <div class="progress-photo-placeholder">
            <svg width="60%" height="60%" viewBox="0 0 100 100" fill="none" stroke="#6ee7b7" stroke-width="0.6">
              <circle cx="50" cy="32" r="11"></circle>
              <path d="M30 88 C 30 64, 40 50, 50 50 C 60 50, 70 64, 70 88"></path>
            </svg>
          </div>
          <div class="progress-photo-overlay"></div>
          <div class="progress-photo-meta">
            <span class="photo-date">May 8</span>
            <span>162.3 lbs</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <div class="photo-viewer" id="photoViewer" aria-hidden="true">
    <div class="photo-viewer-eyebrow">Good Morning · Progress</div>
    <div class="photo-viewer-stage" id="photoViewerStage">
      <div class="photo-viewer-frame" id="photoViewerFrame"></div>
    </div>
    <div class="photo-viewer-meta">
      <div class="photo-viewer-date" id="photoViewerDate">MAY 8</div>
      <div class="photo-viewer-weight" id="photoViewerWeight">162.3 lbs</div>
    </div>
    <div class="photo-viewer-actions">
      <button class="photo-viewer-btn pv-compare" id="pvCompare" type="button">Compare</button>
      <button class="photo-viewer-btn pv-close" id="pvClose" type="button">Close</button>
      <button class="photo-viewer-btn pv-delete" id="pvDelete" type="button">Delete</button>
    </div>
  </div>

  <div class="compare-view" id="compareView" aria-hidden="true">
    <div class="compare-header">
      <div class="compare-title">COMPARE</div>
      <button class="compare-close" id="compareClose" type="button">Done</button>
    </div>
    <div class="compare-stage">
      <div class="compare-slot" id="compareSlotA">
        <div class="compare-slot-meta">
          <div class="compare-slot-date" id="compareSlotADate">MAY 8</div>
          <div class="compare-slot-weight" id="compareSlotAWeight">162.3 lbs</div>
        </div>
      </div>
      <div class="compare-slot" id="compareSlotB">
        <div class="compare-slot-meta">
          <div class="compare-slot-date" id="compareSlotBDate">—</div>
          <div class="compare-slot-weight" id="compareSlotBWeight">Pick photo</div>
        </div>
      </div>
    </div>
    <div class="compare-picker" id="comparePicker">
      <div class="compare-picker-label">Choose a photo to compare with</div>
      <div class="compare-picker-grid" id="comparePickerGrid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const photos = [{ id: 'seed', date: 'May 8', dateUpper: 'MAY 8', weight: '162.3 lbs', dataUrl: null }];
    let nextId = 1;
    let currentPhotoId = null;
    let deleteConfirm = false;
    let deleteConfirmTimeout = null;

    const $ = (id) => document.getElementById(id);
    const editBtn = $('weightEditBtn');
    const saveBtn = $('weightSaveBtn');
    const lockedState = $('weightLocked');
    const inputRow = $('weightInputRow');
    const weightInput = $('weightInput');
    const weightNumEl = document.querySelector('.weight-num');
    const weightLockedValueEl = document.querySelector('.weight-locked-value');
    const progressLink = $('progressLink');
    const progressOverlay = $('progressOverlay');
    const progressBack = $('progressBack');
    const progressLinkCount = $('progressLinkCount');
    const progressGrid = $('progressGrid');
    const takePhotoBtn = $('takePhotoBtn');
    const fromLibraryBtn = $('fromLibraryBtn');
    const cameraInput = $('cameraInput');
    const libraryInput = $('libraryInput');
    const photoViewer = $('photoViewer');
    const photoViewerFrame = $('photoViewerFrame');
    const photoViewerDate = $('photoViewerDate');
    const photoViewerWeight = $('photoViewerWeight');
    const pvCompare = $('pvCompare');
    const pvClose = $('pvClose');
    const pvDelete = $('pvDelete');
    const compareView = $('compareView');
    const compareClose = $('compareClose');
    const compareSlotA = $('compareSlotA');
    const compareSlotADate = $('compareSlotADate');
    const compareSlotAWeight = $('compareSlotAWeight');
    const compareSlotB = $('compareSlotB');
    const compareSlotBDate = $('compareSlotBDate');
    const compareSlotBWeight = $('compareSlotBWeight');
    const comparePicker = $('comparePicker');
    const comparePickerGrid = $('comparePickerGrid');
    const toastEl = $('toast');

    function placeholderSvg() {
      return `
        <div class="progress-photo-placeholder">
          <svg width="60%" height="60%" viewBox="0 0 100 100" fill="none" stroke="#6ee7b7" stroke-width="0.6">
            <circle cx="50" cy="32" r="11"></circle>
            <path d="M30 88 C 30 64, 40 50, 50 50 C 60 50, 70 64, 70 88"></path>
          </svg>
        </div>
      `;
    }

    function formatToday() {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const date = new Date();
      return { short: `${months[date.getMonth()]} ${date.getDate()}`, upper: `${months[date.getMonth()].toUpperCase()} ${date.getDate()}` };
    }

    function getCurrentWeight() {
      return `${weightNumEl.textContent} lbs`;
    }

    function getPhoto(id) {
      return photos.find((photo) => String(photo.id) === String(id));
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('is-visible');
      setTimeout(() => toastEl.classList.remove('is-visible'), 1800);
    }

    function renderPhotoMedia(container, photo, imageClass = 'progress-photo-img') {
      const meta = container.querySelector('.compare-slot-meta');
      container.innerHTML = '';
      if (photo && photo.dataUrl) {
        const img = document.createElement('img');
        img.className = imageClass;
        img.src = photo.dataUrl;
        img.alt = 'Progress photo';
        container.appendChild(img);
      } else {
        container.insertAdjacentHTML('beforeend', placeholderSvg());
      }
      if (meta) container.appendChild(meta);
    }

    function buildPhotoCard(photo) {
      const card = document.createElement('button');
      card.className = 'progress-photo-card';
      card.type = 'button';
      card.dataset.photoId = photo.id;
      card.setAttribute('aria-label', 'Open photo');
      if (photo.dataUrl) {
        const img = document.createElement('img');
        img.className = 'progress-photo-img';
        img.src = photo.dataUrl;
        img.alt = 'Progress photo';
        card.appendChild(img);
      } else {
        card.insertAdjacentHTML('beforeend', placeholderSvg());
      }
      const overlay = document.createElement('div');
      overlay.className = 'progress-photo-overlay';
      const meta = document.createElement('div');
      meta.className = 'progress-photo-meta';
      meta.innerHTML = `<span class="photo-date">${photo.date}</span><span>${photo.weight}</span>`;
      card.append(overlay, meta);
      card.addEventListener('click', () => openViewer(photo.id));
      return card;
    }

    function updatePhotoCount() {
      const count = photos.length;
      progressLinkCount.textContent = count === 0
        ? '0 photos'
        : `${count} photo${count === 1 ? '' : 's'} · latest ${photos[photos.length - 1].date}`;
    }

    function ensureEmptyStateIfNone() {
      const empty = document.querySelector('.progress-empty');
      if (photos.length === 0 && !empty) {
        const div = document.createElement('div');
        div.className = 'progress-empty';
        div.textContent = 'No photos yet · tap Take Photo to start';
        progressGrid.appendChild(div);
      }
      if (photos.length > 0 && empty) empty.remove();
    }

    function addPhotoFromFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const date = formatToday();
        const photo = {
          id: nextId++,
          date: date.short,
          dateUpper: date.upper,
          weight: getCurrentWeight(),
          dataUrl: event.target.result
        };
        photos.push(photo);
        ensureEmptyStateIfNone();
        progressGrid.appendChild(buildPhotoCard(photo));
        updatePhotoCount();
        showToast('Photo added');
      };
      reader.readAsDataURL(file);
    }

    editBtn.addEventListener('click', () => {
      lockedState.classList.add('hidden');
      inputRow.classList.remove('hidden');
      weightInput.focus();
      weightInput.select();
    });

    saveBtn.addEventListener('click', () => {
      const newValue = parseFloat(weightInput.value);
      if (!Number.isNaN(newValue) && newValue > 0) {
        weightNumEl.textContent = newValue.toFixed(1);
        weightLockedValueEl.textContent = `${newValue.toFixed(1)} lbs`;
      }
      inputRow.classList.add('hidden');
      lockedState.classList.remove('hidden');
    });

    progressLink.addEventListener('click', () => {
      progressOverlay.classList.add('is-open');
      progressOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    });

    progressBack.addEventListener('click', () => {
      progressOverlay.classList.remove('is-open');
      progressOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    });

    takePhotoBtn.addEventListener('click', () => cameraInput.click());
    fromLibraryBtn.addEventListener('click', () => libraryInput.click());

    [cameraInput, libraryInput].forEach((input) => {
      input.addEventListener('change', (event) => {
        addPhotoFromFile(event.target.files && event.target.files[0]);
        event.target.value = '';
      });
    });

    function resetDeleteConfirm() {
      deleteConfirm = false;
      pvDelete.textContent = 'Delete';
      pvDelete.classList.remove('is-confirm');
      if (deleteConfirmTimeout) clearTimeout(deleteConfirmTimeout);
      deleteConfirmTimeout = null;
    }

    function openViewer(id) {
      const photo = getPhoto(id);
      if (!photo) return;
      currentPhotoId = id;
      renderPhotoMedia(photoViewerFrame, photo, 'photo-viewer-img');
      photoViewerDate.textContent = photo.dateUpper;
      photoViewerWeight.textContent = photo.weight;
      photoViewer.classList.add('is-open');
      photoViewer.setAttribute('aria-hidden', 'false');
      resetDeleteConfirm();
    }

    function closeViewer() {
      photoViewer.classList.remove('is-open');
      photoViewer.setAttribute('aria-hidden', 'true');
      currentPhotoId = null;
      resetDeleteConfirm();
    }

    pvClose.addEventListener('click', closeViewer);
    photoViewer.addEventListener('click', (event) => {
      if (event.target === photoViewer || event.target.classList.contains('photo-viewer-stage')) closeViewer();
    });

    pvDelete.addEventListener('click', () => {
      if (!deleteConfirm) {
        deleteConfirm = true;
        pvDelete.textContent = 'Confirm delete?';
        pvDelete.classList.add('is-confirm');
        deleteConfirmTimeout = setTimeout(resetDeleteConfirm, 3000);
        return;
      }
      const id = currentPhotoId;
      const card = progressGrid.querySelector(`[data-photo-id="${id}"]`);
      if (card) {
        card.classList.add('is-removing');
        setTimeout(() => {
          card.remove();
          const idx = photos.findIndex((photo) => String(photo.id) === String(id));
          if (idx > -1) photos.splice(idx, 1);
          ensureEmptyStateIfNone();
          updatePhotoCount();
        }, 250);
      }
      closeViewer();
    });

    function renderCompareSlot(slot, photo) {
      renderPhotoMedia(slot, photo, '');
    }

    function openCompare() {
      if (photos.length < 2) {
        showToast('Need 2+ photos to compare');
        return;
      }
      const current = getPhoto(currentPhotoId);
      renderCompareSlot(compareSlotA, current);
      compareSlotADate.textContent = current.dateUpper;
      compareSlotAWeight.textContent = current.weight;
      renderCompareSlot(compareSlotB, null);
      compareSlotBDate.textContent = '—';
      compareSlotBWeight.textContent = 'Pick photo';
      comparePickerGrid.innerHTML = '';
      photos.filter((photo) => String(photo.id) !== String(currentPhotoId)).forEach((photo) => {
        const thumb = document.createElement('button');
        thumb.type = 'button';
        thumb.className = 'compare-picker-thumb';
        if (photo.dataUrl) {
          const img = document.createElement('img');
          img.src = photo.dataUrl;
          img.alt = '';
          thumb.appendChild(img);
        } else {
          thumb.insertAdjacentHTML('beforeend', placeholderSvg());
        }
        const dateLabel = document.createElement('div');
        dateLabel.className = 'compare-picker-thumb-date';
        dateLabel.textContent = photo.date;
        thumb.appendChild(dateLabel);
        thumb.addEventListener('click', () => {
          renderCompareSlot(compareSlotB, photo);
          compareSlotBDate.textContent = photo.dateUpper;
          compareSlotBWeight.textContent = photo.weight;
          comparePicker.style.display = 'none';
        });
        comparePickerGrid.appendChild(thumb);
      });
      comparePicker.style.display = '';
      compareView.classList.add('is-open');
      compareView.setAttribute('aria-hidden', 'false');
    }

    pvCompare.addEventListener('click', openCompare);
    compareClose.addEventListener('click', () => {
      compareView.classList.remove('is-open');
      compareView.setAttribute('aria-hidden', 'true');
    });

    document.querySelectorAll('.progress-photo-card').forEach((card) => {
      card.addEventListener('click', () => openViewer(card.dataset.photoId));
    });

    renderPhotoMedia(photoViewerFrame, photos[0], 'photo-viewer-img');
    updatePhotoCount();
  </script>
</body>
</html>
